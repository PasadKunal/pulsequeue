spring:
  application:
    name: pulsequeue

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pulsequeue: DEBUG
    org.springframework.kafka: INFO

pulsequeue:
  kafka:
    topics:
      events-raw: events.raw
      metrics-aggregated: metrics.aggregated
