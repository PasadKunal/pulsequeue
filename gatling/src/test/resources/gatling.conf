gatling {
  core {
    outputDirectoryBaseName = "pulsequeue"
    runDescription = "PulseQueue load test"
    encoding = "utf-8"
  }
  http {
    connectTimeout = 10000
    readTimeout = 60000
    requestTimeout = 60000
  }
  data {
    writers = [console, file]
    console {
      light = false
    }
    file {
      bufferSize = 8192
    }
  }
}
